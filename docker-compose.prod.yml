# ============================================
# MyAPI - 生产环境叠加配置 (MySQL + Redis)
# 适用于 Linux 服务器生产环境
# 用法: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================

services:
  new-api:
    environment:
      # 覆盖本地 SQLite 为 MySQL
      - SQL_DSN=${MYSQL_USER:-newapi}:${MYSQL_PASSWORD:-ChangeMe123!}@tcp(${MYSQL_HOST:-mysql}:${MYSQL_PORT:-3306})/${MYSQL_DATABASE:-newapi}?charset=utf8mb4&parseTime=True&loc=Local
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: new-api-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-RootPassword123!}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-newapi}
      - MYSQL_USER=${MYSQL_USER:-newapi}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-ChangeMe123!}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./mysql-conf:/etc/mysql/conf.d
    ports:
      # 本地调试可开，云端建议注释掉此行只允许内网访问
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-RootPassword123!}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - new-api-net

  # 可选：Redis 缓存（提升高并发性能）
  # redis:
  #   image: redis:7-alpine
  #   container_name: new-api-redis
  #   restart: unless-stopped
  #   volumes:
  #     - ./redis-data:/data
  #   networks:
  #     - new-api-net
